data:
    num_workers: 4

model:
    name: 'physense_for_pipe_crossattn_walk'
    in_channels: 2
    out_channels: 1
    image_size: [171, 360]
    patch_size: [3, 3]

training:
    batch_size: 10 # 4 gpus in default
    gpu_num: 4
    n_epochs: 1
    save_freq: 1
    ckpt_path: './checkpoints'

    sensor_number: 50
    seed: 1
    base_model_path: ./checkpoints/sea_best_base_model.pth

optim:
    lr: 1