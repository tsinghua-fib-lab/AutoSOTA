dataset_path: data/spatial_avqa
dataset_name: test/savvy_bench.json
dataset_kwargs:
  token: True
  cache_dir: videos
  video: False
  local_files_only: True
task: spatial_avqa
test_split: val
output_type: generate_until
process_docs: !function utils.process_docs
doc_to_visual: !function utils.spatial_avqa_doc_to_visual
doc_to_text: !function utils.spatial_avqa_doc_to_text
# doc_to_text: !spatial_avqa_doc_to_sd_text # sd eval prompt
doc_to_target: "ground_truth"
generation_kwargs:
  max_new_tokens: 16
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
process_results: !function utils.spatial_avqa_process_results
metric_list:
  - metric: spatial_avqa_score
    aggregation: !function utils.spatial_avqa_aggregate_results
    higher_is_better: true
lmms_eval_specific_kwargs:
  default:
    pre_prompt: "" 
    post_prompt: ""
    mca_post_prompt: ""
    na_spatial_post_prompt: ""
    na_time_post_prompt: ""
metadata:
  - version: 0.0