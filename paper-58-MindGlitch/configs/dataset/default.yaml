# Default configuration for the dataset generation

# Basic run configuration
name: "default"
num_imgs: 100
dataset_path: ""

img_size: [768,768]

# Generation configuration
point_idxs_to_segment: [0, 10, 20, 30]
matching_score_thresh: 0.7
matching_skewness_thresh: 1.3
part_aspect_ratio_diff_thresh: 0.2
part_relative_sz_min_thresh: 0.05
part_relative_sz_max_thresh: 0.6
part_relative_sz_diff_thresh: 0.1
inpainting_lpips_thresh: 0.15 # makes sure that the inpainting part is different from the original image

# Inpainting configurations
inpainting_model: "sdxl"  
flux_config:
  num_inference_steps: 50
  height: 512
  width: 512
  guidance_scale: 3.5
  max_sequence_length: 512
  
sdxl_config:
  guidance_scale: 7.5
  num_inference_steps: 30
  strength: 0.98
  padding_mask_crop: 32
  dilate_masks: false
  dilation_kernel_size: 3
